# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8081

# ─── H2 In-Memory Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─── H2 Console (http://localhost:8080/h2-console) ────────────────────────────
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# create-drop: builds schema on startup, drops it on shutdown (ideal for dev)
spring.jpa.hibernate.ddl-auto=create-drop

# Log generated SQL — set to false to silence once things are working
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Jackson ──────────────────────────────────────────────────────────────────
# Serialize LocalDate as "2024-06-15", not a timestamp array
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Dotenv ───────────────────────────────────────────────────────────────────
# spring-dotenv v3.x requires an explicit import to load the .env file.
spring.config.import=optional:dotenv:

# ─── Anthropic API ────────────────────────────────────────────────────────────
# Copy .env.example → .env and set ANTHROPIC_API_KEY to your key from
# https://console.anthropic.com — the app will fail to start if it is missing.
anthropic.api-key=${ANTHROPIC_API_KEY:}